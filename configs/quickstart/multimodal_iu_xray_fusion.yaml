seed: 42
tracking_uri: "file:./mlruns"
experiment_name: "quickstart_multimodal"
run_name: "quickstart_iu_xray_fusion"
output_dir: "artifacts/quickstart/multimodal_iu_xray_fusion"

dataset:
  csv_path: "data/iu_xray/iu_xray_multimodal.csv"
  image_base_dir: "data/iu_xray"
  split_column: "split"
  image_column: "image_path"
  text_column: "report_text"
  label_columns:
    - "atelectasis"
    - "cardiomegaly"
    - "effusion"
    - "edema"
    - "pneumothorax"
    - "hernia"
  image_size: 96
  batch_size: 32
  num_workers: 0
  max_length: 96
  min_token_freq: 1
  max_vocab_size: 5000
  max_train_samples: 1024
  max_val_samples: 256
  max_test_samples: 256

model:
  mode: "fusion"
  image_embedding_dim: 128
  text_embedding_dim: 128
  fusion_hidden_dim: 256
  dropout: 0.25
  modality_dropout: 0.2

training:
  epochs: 1
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "none"
  use_pos_weight: true
  early_stopping_patience: 1
