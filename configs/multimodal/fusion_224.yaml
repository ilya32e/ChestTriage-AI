seed: 42
tracking_uri: "file:./mlruns"
experiment_name: "radiology_multimodal"
run_name: "iu_xray_fusion_text_224"
output_dir: "artifacts/multimodal/iu_xray_fusion_224"

dataset:
  csv_path: "data/iu_xray/iu_xray_multimodal.csv"
  image_base_dir: "data/iu_xray"
  split_column: "split"
  image_column: "image_path"
  text_column: "report_text"
  label_columns:
    - "atelectasis"
    - "cardiomegaly"
    - "effusion"
    - "edema"
    - "pneumothorax"
    - "hernia"
  image_size: 224
  batch_size: 8
  num_workers: 0
  max_length: 128
  min_token_freq: 1
  max_vocab_size: 5000
  redact_label_mentions: true

model:
  mode: "fusion"
  image_embedding_dim: 128
  text_embedding_dim: 128
  fusion_hidden_dim: 256
  dropout: 0.25
  modality_dropout: 0.2

training:
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"
  use_pos_weight: true
  early_stopping_patience: 3
