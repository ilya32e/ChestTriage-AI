seed: 42
deterministic: false
tracking_uri: "file:./mlruns"
experiment_name: "radiology_multimodal"
run_name: "nih_fusion_metadata"
output_dir: "artifacts/multimodal/nih_fusion"

dataset:
  csv_path: "data/nih/nih_multimodal_metadata.csv"
  image_base_dir: "."
  split_column: "split"
  image_column: "image_path"
  text_column: "metadata_text"
  label_columns:
    - "atelectasis"
    - "cardiomegaly"
    - "effusion"
    - "infiltration"
    - "mass"
    - "nodule"
    - "pneumonia"
    - "pneumothorax"
    - "consolidation"
    - "edema"
    - "emphysema"
    - "fibrosis"
    - "pleural"
    - "hernia"
  image_size: 128
  batch_size: 64
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 4
  eval_num_workers: 0
  max_length: 128
  min_token_freq: 1
  max_vocab_size: 5000

model:
  mode: "fusion"
  image_embedding_dim: 128
  text_embedding_dim: 128
  fusion_hidden_dim: 256
  dropout: 0.25
  modality_dropout: 0.2

training:
  epochs: 0
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"
  use_pos_weight: true
  use_amp: true
  early_stopping_patience: 3
