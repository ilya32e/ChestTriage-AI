seed: 42
tracking_uri: "file:./mlruns"
experiment_name: "chestmnist_supervised"
run_name: "simple_cnn_from_scratch"
output_dir: "artifacts/supervised/simple_cnn"

dataset:
  root: "data/medmnist"
  size: 128
  image_size: 128
  batch_size: 64
  num_workers: 0
  as_rgb: true
  normalization: "imagenet"
  download: true

model:
  name: "simple_cnn"
  pretrained: false
  dropout: 0.25
  freeze_backbone: false

training:
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  scheduler: "cosine"
  use_pos_weight: true
  early_stopping_patience: 3

