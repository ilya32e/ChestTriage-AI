seed: 42
tracking_uri: "file:./mlruns"
experiment_name: "chestmnist_supervised"
run_name: "vit_b16"
output_dir: "artifacts/supervised/vit_b16"

dataset:
  root: "data/medmnist"
  size: 128
  image_size: 224
  batch_size: 16
  num_workers: 0
  as_rgb: true
  normalization: "imagenet"
  download: true

model:
  name: "vit_b_16"
  pretrained: true
  dropout: 0.1
  freeze_backbone: false

training:
  epochs: 6
  lr: 0.0001
  weight_decay: 0.0001
  scheduler: "cosine"
  use_pos_weight: true
  early_stopping_patience: 2

